name = "bastion"
main = "build/worker/shim.mjs"
compatibility_date = "2026-03-01"

[build]
command = "worker-build --release"

[[durable_objects.bindings]]
name = "KEY_STATE"
class_name = "KeyState"

[[durable_objects.bindings]]
name = "EMAIL_INDEX"
class_name = "EmailIndex"

[[durable_objects.bindings]]
name = "DEMO_RATE_LIMIT"
class_name = "DemoRateLimit"

[[migrations]]
tag = "v1"
new_classes = ["KeyState", "EmailIndex", "DemoRateLimit"]